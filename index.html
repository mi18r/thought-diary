<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thought Diary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    font-size: 48px;
    margin-bottom: 10px;
}

.container {
    max-width: 600px;
    margin: auto;
}

#totalCount {
    text-align: center;
    color: gray;
    font-size: 18px;
    margin-bottom: 20px;
}

textarea {
    width: 100%;
    height: 180px;
    padding: 16px;
    font-size: 18px;
    border-radius: 20px;
    border: 2px solid #d1d1d1;
    resize: none;
    background: white;
}

.char-count {
    text-align: right;
    font-size: 14px;
    color: gray;
    margin-top: 8px;
    margin-bottom: 20px;
}

button {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 20px;
    background: black;
    color: white;
    font-size: 22px;
    cursor: pointer;
}

.post {
    background: white;
    padding: 16px;
    margin-top: 16px;
    border-radius: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.post-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.thought-id {
    font-weight: bold;
    font-size: 16px;
}

.trash {
    cursor: pointer;
    font-size: 22px;
}

.date {
    font-size: 12px;
    color: gray;
    margin-bottom: 10px;
}

.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: white;
    padding: 24px;
    border-radius: 20px;
    width: 85%;
    max-width: 320px;
    text-align: center;
}

.modal-content p {
    font-size: 18px;
    margin-bottom: 20px;
}

.modal-buttons {
    display: flex;
    gap: 10px;
}

.modal-buttons button {
    flex: 1;
}

.secondary {
    background: #d9d9d9;
    color: black;
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Thought Diary</h1>

    <div id="totalCount">0 thoughts</div>

    <textarea id="thoughtInput" maxlength="500" placeholder="Write your thought..."></textarea>

    <div class="char-count" id="charCount">0 / 500</div>

    <button onclick="addThought()">Post</button>

    <div id="posts"></div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <p>Delete this thought?</p>

        <div class="modal-buttons">
            <button id="yesDelete">Yes</button>
            <button id="noDelete" class="secondary">No</button>
        </div>
    </div>
</div>

<script>
const input = document.getElementById("thoughtInput");
const charCount = document.getElementById("charCount");
const postsDiv = document.getElementById("posts");

input.addEventListener("input", () => {
    charCount.textContent = `${input.value.length} / 500`;
});

function loadThoughts() {
    const thoughts = JSON.parse(localStorage.getItem("thoughts")) || [];

    postsDiv.innerHTML = "";

    document.getElementById("totalCount").textContent =
        `${thoughts.length} thoughts`;

    thoughts.slice().reverse().forEach((t, index) => {

        const actualIndex = thoughts.length - 1 - index;
        const thoughtNumber = actualIndex + 1;

        const div = document.createElement("div");

        div.className = "post";

        div.innerHTML = `
            <div class="post-header">
                <div class="thought-id">T-${thoughtNumber}</div>

                <div class="trash"
                     onclick="deleteThought(${actualIndex})">
                     🗑️
                </div>
            </div>

            <div class="date">${t.date}</div>

            <div>${t.text}</div>
        `;

        postsDiv.appendChild(div);
    });
}

function addThought() {

    const text = input.value.trim();

    if (!text) return;

    const thoughts =
        JSON.parse(localStorage.getItem("thoughts")) || [];

    thoughts.push({
        text: text,
        date: new Date().toLocaleString()
    });

    localStorage.setItem(
        "thoughts",
        JSON.stringify(thoughts)
    );

    input.value = "";

    charCount.textContent = "0 / 500";

    loadThoughts();
}

let deleteIndex = null;

function deleteThought(index) {

    deleteIndex = index;

    document.getElementById("confirmModal").style.display = "flex";
}

document.getElementById("yesDelete").onclick = function() {

    const thoughts =
        JSON.parse(localStorage.getItem("thoughts")) || [];

    thoughts.splice(deleteIndex, 1);

    localStorage.setItem(
        "thoughts",
        JSON.stringify(thoughts)
    );

    loadThoughts();

    document.getElementById("confirmModal").style.display = "none";
};

document.getElementById("noDelete").onclick = function() {

    document.getElementById("confirmModal").style.display = "none";
};

loadThoughts();
</script>

</body>
</html>
