<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thought Diary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #f5f5f7;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    .container {
        max-width: 600px;
        margin: auto;
    }

    textarea {
        width: 100%;
        height: 100px;
        padding: 10px;
        font-size: 16px;
        border-radius: 10px;
        border: 1px solid #ccc;
        resize: none;
    }

    .char-count {
        text-align: right;
        font-size: 12px;
        color: gray;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: black;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    .post {
        background: white;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .date {
        font-size: 12px;
        color: gray;
        margin-bottom: 5px;
    }

    .delete {
        margin-top: 5px;
        background: #ff3b30;
    }
</style>
</head>
<body>

<div class="container">
    <h1>🧠 Thought Diary</h1>

    <textarea id="thoughtInput" maxlength="500" placeholder="Write your thought..."></textarea>
    <div class="char-count" id="charCount">0 / 500</div>
    <button onclick="addThought()">Post</button>

    <div id="posts"></div>
</div>

<script>
    const input = document.getElementById("thoughtInput");
    const charCount = document.getElementById("charCount");
    const postsDiv = document.getElementById("posts");

    input.addEventListener("input", () => {
        charCount.textContent = `${input.value.length} / 500`;
    });

    function loadThoughts() {
        const thoughts = JSON.parse(localStorage.getItem("thoughts")) || [];
        postsDiv.innerHTML = "";

        thoughts.slice().reverse().forEach((t, index) => {
            const div = document.createElement("div");
            div.className = "post";

            div.innerHTML = `
                <div class="date">${t.date}</div>
                <div>${t.text}</div>
                <button class="delete" onclick="deleteThought(${thoughts.length - 1 - index})">Delete</button>
            `;

            postsDiv.appendChild(div);
        });
    }

    function addThought() {
        const text = input.value.trim();
        if (!text) return;

        const thoughts = JSON.parse(localStorage.getItem("thoughts")) || [];

        thoughts.push({
            text: text,
            date: new Date().toLocaleString()
        });

        localStorage.setItem("thoughts", JSON.stringify(thoughts));

        input.value = "";
        charCount.textContent = "0 / 500";

        loadThoughts();
    }

    function deleteThought(index) {
        const thoughts = JSON.parse(localStorage.getItem("thoughts")) || [];
        thoughts.splice(index, 1);
        localStorage.setItem("thoughts", JSON.stringify(thoughts));
        loadThoughts();
    }

    loadThoughts();
</script>

</body>
</html>
